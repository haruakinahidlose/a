<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>nebula2</title>
<style>
  body {
    margin: 0;
    background: #87CEEB; /* daytime sky */
    overflow: hidden;
  }
  canvas {
    display: block;
    background: #7ecf5f; /* grass */
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// Player
let px = 300, py = 300;
let angle = 0;
let keys = {};
let bullets = [];
let enemies = [];
let shootCooldown = 0;

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Spawn enemies
function spawnEnemies() {
  enemies = [];
  for (let i = 0; i < 10; i++) {
    enemies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      alive: true
    });
  }
}
spawnEnemies();

// Full auto shooting
function shoot() {
  bullets.push({
    x: px,
    y: py,
    dx: Math.cos(angle) * 6,
    dy: Math.sin(angle) * 6
  });
}

// Game loop
function update() {
  const speed = 3;

  // Movement
  if (keys["w"]) py -= speed;
  if (keys["s"]) py += speed;
  if (keys["a"]) px -= speed;
  if (keys["d"]) px += speed;

  // Aiming with arrow keys
  if (keys["arrowleft"]) angle -= 0.1;
  if (keys["arrowright"]) angle += 0.1;

  // Full auto
  if (keys["f"]) {
    if (shootCooldown <= 0) {
      shoot();
      shootCooldown = 1; // lower = faster
    }
  }
  if (shootCooldown > 0) shootCooldown--;

  // Move bullets
  bullets.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
  });

  // Enemy movement
  enemies.forEach(e => {
    if (!e.alive) return;
    const dx = px - e.x;
    const dy = py - e.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 5) {
      e.x += dx / dist * 1.2;
      e.y += dy / dist * 1.2;
    }
  });

  // Bullet collision
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (!e.alive) return;
      if (Math.hypot(b.x - e.x, b.y - e.y) < 15) {
        e.alive = false;
      }
    });
  });

  // Respawn when all dead
  if (enemies.every(e => !e.alive)) spawnEnemies();
}

function drawPlayer() {
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(angle);

  // Pixel stickman
  ctx.fillStyle = "#000";
  ctx.fillRect(-5, -10, 10, 20); // body
  ctx.fillRect(0, -2, 15, 4);    // gun

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    ctx.fillStyle = "red";
    ctx.fillRect(e.x - 10, e.y - 10, 20, 20);
  });

  // Draw bullets
  ctx.fillStyle = "black";
  bullets.forEach(b => {
    ctx.fillRect(b.x - 3, b.y - 3, 6, 6);
  });

  drawPlayer();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
