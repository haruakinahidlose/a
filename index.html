<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>nebul2</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #87CEEB;
  }
  canvas {
    background: #7ecf5f;
    display: block;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// Player
let px = 300, py = 300;
let angle = 0;
let hp = 100;
let alive = true;

let keys = {};
let bullets = [];
let enemies = [];
let boss = null;
let superBosses = [];

let wave = 1;

// Damage cooldowns
let smallHitCooldown = 0;
let bossHitCooldown = 0;
let superBossHitCooldown = 0;

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Spawn waves
function spawnWave() {
  enemies = [];
  superBosses = [];

  if (wave < 3) {
    for (let i = 0; i < 25 + wave * 10; i++) {
      enemies.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        alive: true
      });
    }

    boss = {
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      alive: true,
      size: 60
    };
  }

  // SUPER BOSS APOCALYPSE
  if (wave === 3) {
    boss = null;

    // Spawn 6700 SUPER BOSSES
    for (let i = 0; i < 6700; i++) {
      superBosses.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        alive: true,
        size: 50
      });
    }
  }
}

spawnWave();

// Full auto shooting
function shoot() {
  bullets.push({
    x: px,
    y: py,
    dx: Math.cos(angle) * 10,
    dy: Math.sin(angle) * 10
  });
}

function update() {
  if (!alive) return;

  // Player speed
  const speed = 5 * 1.3;

  if (keys["w"]) py -= speed;
  if (keys["s"]) py += speed;
  if (keys["a"]) px -= speed;
  if (keys["d"]) px += speed;

  // TURN RATE 2×
  if (keys["arrowleft"]) angle -= 0.24;
  if (keys["arrowright"]) angle += 0.24;

  // HEAL +670 HP
  if (keys[" "]) hp += 670;

  // Max fire rate
  if (keys["f"]) shoot();

  // Move bullets
  bullets.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
  });

  // Faster small enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    const dx = px - e.x;
    const dy = py - e.y;
    const dist = Math.hypot(dx, dy);
    e.x += dx / dist * 3;
    e.y += dy / dist * 3;
  });

  // Boss movement
  if (boss && boss.alive) {
    const dx = px - boss.x;
    const dy = py - boss.y;
    const dist = Math.hypot(dx, dy);
    boss.x += dx / dist * 2.2;
    boss.y += dy / dist * 2.2;
  }

  // SUPER BOSSES (fast)
  superBosses.forEach(sb => {
    if (!sb.alive) return;
    const dx = px - sb.x;
    const dy = py - sb.y;
    const dist = Math.hypot(dx, dy);
    sb.x += dx / dist * 3.5;
    sb.y += dy / dist * 3.5;
  });

  // Bullet collision
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (!e.alive) return;
      if (Math.hypot(b.x - e.x, b.y - e.y) < 15) {
        e.alive = false;
      }
    });

    if (boss && boss.alive) {
      if (Math.hypot(b.x - boss.x, b.y - boss.y) < boss.size) {
        boss.alive = false;
      }
    }

    superBosses.forEach(sb => {
      if (!sb.alive) return;
      if (Math.hypot(b.x - sb.x, b.y - sb.y) < sb.size) {
        sb.alive = false;
      }
    });
  });

  // SMALL ENEMY DAMAGE (500 dmg, 2s cd)
  if (smallHitCooldown <= 0) {
    enemies.forEach(e => {
      if (!e.alive) return;
      if (Math.hypot(px - e.x, py - e.y) < 20) {
        hp -= 500;
        smallHitCooldown = 120;
      }
    });
  } else smallHitCooldown--;

  // BOSS DAMAGE (1000 dmg, 2s cd)
  if (boss && boss.alive && bossHitCooldown <= 0) {
    if (Math.hypot(px - boss.x, py - boss.y) < boss.size) {
      hp -= 1000;
      bossHitCooldown = 120;
    }
  } else bossHitCooldown--;

  // SUPER BOSS DAMAGE (2000 dmg, 2s cd)
  if (superBossHitCooldown <= 0) {
    superBosses.forEach(sb => {
      if (!sb.alive) return;
      if (Math.hypot(px - sb.x, py - sb.y) < sb.size) {
        hp -= 2000;
        superBossHitCooldown = 120;
      }
    });
  } else superBossHitCooldown--;

  // DEATH FIX — stop at 0 HP
  if (hp <= 0) {
    hp = 0;
    alive = false;
  }

  // Wave clear
  const allSmallDead = enemies.every(e => !e.alive);
  const bossDead = !boss || !boss.alive;
  const allSuperDead = superBosses.every(sb => !sb.alive);

  if (wave < 3 && allSmallDead && bossDead) {
    wave++;
    spawnWave();
  }

  if (wave === 3 && allSuperDead) {
    spawnWave();
  }
}

function drawPlayer() {
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(angle);

  ctx.fillStyle = "#000";
  ctx.fillRect(-4, -10, 8, 20);
  ctx.fillRect(0, -2, 18, 4);

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Small enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    ctx.fillStyle = "red";
    ctx.fillRect(e.x - 10, e.y - 10, 20, 20);
  });

  // Boss
  if (boss && boss.alive) {
    ctx.fillStyle = "purple";
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, boss.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // SUPER BOSSES
  superBosses.forEach(sb => {
    if (!sb.alive) return;
    ctx.fillStyle = "blue";
    ctx.beginPath();
    ctx.arc(sb.x, sb.y, sb.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // Bullets
  ctx.fillStyle = "black";
  bullets.forEach(b => {
    ctx.fillRect(b.x - 3, b.y - 3, 6, 6);
  });

  drawPlayer();

  // HP + Wave
  ctx.fillStyle = "black";
  ctx.font = "24px Arial";
  ctx.fillText("HP: " + hp, 20, 30);
  ctx.fillText("Wave: " + wave, 20, 60);

  if (!alive) {
    ctx.fillStyle = "black";
    ctx.font = "60px Arial";
    ctx.fillText("YOU DIED", canvas.width / 2 - 150, canvas.height / 2);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
