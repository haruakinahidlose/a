<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>nebula2</title>
<style>
  body {
    margin: 0;
    background: #000;
    overflow: hidden;
    color: #fff;
    font-family: Arial, sans-serif;
  }
  canvas {
    display: block;
  }
  #crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 20px;
    height: 20px;
    margin-left: -10px;
    margin-top: -10px;
    pointer-events: none;
  }
  #crosshair:before, #crosshair:after {
    content: "";
    position: absolute;
    background: #fff;
  }
  #crosshair:before {
    left: 9px;
    top: 0;
    width: 2px;
    height: 20px;
  }
  #crosshair:after {
    top: 9px;
    left: 0;
    width: 20px;
    height: 2px;
  }
  #ui {
    position: fixed;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    text-shadow: 0 0 5px #000;
    font-size: 14px;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="crosshair"></div>
<div id="ui">WASD = move • Arrows = aim • F = shoot</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// Player
let px = 0, pz = 0;
let angle = 0;
let keys = {};
let score = 0;

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Enemies
let enemies = [];
function spawnEnemies() {
  enemies = [];
  for (let i = 0; i < 10; i++) {
    const dist = 5 + Math.random() * 20;
    const ang = Math.random() * Math.PI * 2;
    enemies.push({
      x: Math.cos(ang) * dist,
      z: Math.sin(ang) * dist,
      alive: true
    });
  }
}
spawnEnemies();

// Shooting
function shoot() {
  const dirX = Math.cos(angle);
  const dirZ = Math.sin(angle);
  let hit = -1;
  let closest = Infinity;

  enemies.forEach((e, i) => {
    if (!e.alive) return;
    const vx = e.x - px;
    const vz = e.z - pz;
    const proj = vx * dirX + vz * dirZ;
    if (proj <= 0) return;
    const perpX = vx - proj * dirX;
    const perpZ = vz - proj * dirZ;
    const distSide = Math.hypot(perpX, perpZ);
    if (distSide < 0.6 && proj < closest) {
      closest = proj;
      hit = i;
    }
  });

  if (hit !== -1) {
    enemies[hit].alive = false;
    score++;
    if (enemies.every(e => !e.alive)) spawnEnemies();
  }
}

document.addEventListener("keydown", e => {
  if (e.key.toLowerCase() === "f") shoot();
});

// Game loop
function update(dt) {
  const speed = 0.01 * dt;

  // Movement
  if (keys["w"]) {
    px += Math.cos(angle) * speed;
    pz += Math.sin(angle) * speed;
  }
  if (keys["s"]) {
    px -= Math.cos(angle) * speed;
    pz -= Math.sin(angle) * speed;
  }
  if (keys["a"]) {
    px += Math.cos(angle - Math.PI/2) * speed;
    pz += Math.sin(angle - Math.PI/2) * speed;
  }
  if (keys["d"]) {
    px += Math.cos(angle + Math.PI/2) * speed;
    pz += Math.sin(angle + Math.PI/2) * speed;
  }

  // Aiming with arrow keys
  if (keys["arrowleft"]) angle -= 0.003 * dt;
  if (keys["arrowright"]) angle += 0.003 * dt;
}

function render() {
  const w = canvas.width;
  const h = canvas.height;
  const horizon = h * 0.5;

  // Sky
  ctx.fillStyle = "#0a0a1a";
  ctx.fillRect(0, 0, w, horizon);

  // Ground
  ctx.fillStyle = "#111";
  ctx.fillRect(0, horizon, w, h);

  // Enemies
  enemies.forEach(e => {
    if (!e.alive) return;

    const relX = e.x - px;
    const relZ = e.z - pz;

    const camZ = relX * Math.cos(angle) + relZ * Math.sin(angle);
    const camX = -relX * Math.sin(angle) + relZ * Math.cos(angle);

    if (camZ <= 0.2) return;

    const scale = 200 / camZ;
    const size = scale * 1.2;
    const x = w/2 + camX * scale;
    const y = horizon - size/2;

    ctx.fillStyle = "cyan";
    ctx.fillRect(x - size/2, y, size, size);
  });

  ctx.fillStyle = "#fff";
  ctx.fillText("Score: " + score, 10, 20);
}

let last = performance.now();
function loop(now) {
  const dt = now - last;
  last = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
