<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Upgraded Shooter</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #87CEEB;
  }
  canvas {
    background: #7ecf5f;
    display: block;
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// Player
let px = 300, py = 300;
let angle = 0;
let hp = 100;

let keys = {};
let bullets = [];
let enemies = [];
let boss = null;

// COOLDOWNS
let smallHitCooldown = 0;
let bossHitCooldown = 0;

// SHOOTING — now unlimited speed
let shootCooldown = 0;

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Spawn enemies + boss
function spawnEnemies() {
  enemies = [];
  for (let i = 0; i < 20; i++) {
    enemies.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      alive: true
    });
  }

  boss = {
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    alive: true,
    size: 60
  };
}
spawnEnemies();

// Full auto shooting (no cooldown)
function shoot() {
  bullets.push({
    x: px,
    y: py,
    dx: Math.cos(angle) * 10,
    dy: Math.sin(angle) * 10
  });
}

function update() {
  // FASTER SPEED
  const speed = 5;

  // Movement
  if (keys["w"]) py -= speed;
  if (keys["s"]) py += speed;
  if (keys["a"]) px -= speed;
  if (keys["d"]) px += speed;

  // 360° aiming
  if (keys["arrowleft"]) angle -= 0.12;
  if (keys["arrowright"]) angle += 0.12;

  // Infinite healing
  if (keys[" "]) hp += 10;

  // MAX FIRE RATE — shoots every frame
  if (keys["f"]) shoot();

  // Move bullets
  bullets.forEach(b => {
    b.x += b.dx;
    b.y += b.dy;
  });

  // Enemy movement
  enemies.forEach(e => {
    if (!e.alive) return;
    const dx = px - e.x;
    const dy = py - e.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 5) {
      e.x += dx / dist * 2;
      e.y += dy / dist * 2;
    }
  });

  // Boss movement
  if (boss && boss.alive) {
    const dx = px - boss.x;
    const dy = py - boss.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 10) {
      boss.x += dx / dist * 1.2;
      boss.y += dy / dist * 1.2;
    }
  }

  // Bullet collision
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (!e.alive) return;
      if (Math.hypot(b.x - e.x, b.y - e.y) < 15) {
        e.alive = false;
      }
    });

    if (boss && boss.alive) {
      if (Math.hypot(b.x - boss.x, b.y - boss.y) < boss.size) {
        boss.alive = false;
      }
    }
  });

  // Enemy damage
  if (smallHitCooldown <= 0) {
    enemies.forEach(e => {
      if (!e.alive) return;
      if (Math.hypot(px - e.x, py - e.y) < 20) {
        hp -= 2;
        smallHitCooldown = 600; // 10s
      }
    });
  } else smallHitCooldown--;

  // Boss damage
  if (boss && boss.alive && bossHitCooldown <= 0) {
    if (Math.hypot(px - boss.x, py - boss.y) < boss.size) {
      hp -= 20;
      bossHitCooldown = 2400; // 40s
    }
  } else bossHitCooldown--;

  // Respawn everything
  if (enemies.every(e => !e.alive) && (!boss || !boss.alive)) {
    spawnEnemies();
  }
}

function drawPlayer() {
  ctx.save();
  ctx.translate(px, py);
  ctx.rotate(angle);

  ctx.fillStyle = "#000";
  ctx.fillRect(-4, -10, 8, 20);
  ctx.fillRect(0, -2, 18, 4);

  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Enemies
  enemies.forEach(e => {
    if (!e.alive) return;
    ctx.fillStyle = "red";
    ctx.fillRect(e.x - 10, e.y - 10, 20, 20);
  });

  // Boss
  if (boss && boss.alive) {
    ctx.fillStyle = "purple";
    ctx.beginPath();
    ctx.arc(boss.x, boss.y, boss.size, 0, Math.PI * 2);
    ctx.fill();
  }

  // Bullets
  ctx.fillStyle = "black";
  bullets.forEach(b => {
    ctx.fillRect(b.x - 3, b.y - 3, 6, 6);
  });

  drawPlayer();

  // HP
  ctx.fillStyle = "black";
  ctx.font = "20px Arial";
  ctx.fillText("HP: " + hp, 20, 30);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
